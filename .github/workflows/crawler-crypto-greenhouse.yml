name: Run Crawler Crypto Greenhouse

on:
  schedule:
    - cron: '0 8 * * 0,2,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Get before total jobs
        id: before
        run: |
          if [ -f crypto_current_gh.json ]; then
            echo "total=$(jq -r '(.total_jobs // .["Total Jobs"] // 0)' crypto_current_gh.json)" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Run crypto_crawler_greenhouse.py
        run: python crypto_crawler_greenhouse.py

      - name: set-output
        if: failure() || success()
        id: set-output
        run: |
          ls -l
          echo "current=$(jq -c . crypto_current_gh.json)" >> $GITHUB_OUTPUT
          echo "after_total=$(jq -r '(.total_jobs // .["Total Jobs"] // 0)' crypto_current_gh.json)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update data via crypto_crawler_greenhouse.py [automated]'
          base: main
          branch: 'auto/crypto-crawler-greenhouse-update'
          title: 'Automated update from crypto_crawler_greenhouse.py'
          body: |
            This PR contains changes made by running crypto_crawler_greenhouse.py via GitHub Actions.

            "Total Jobs": ${{ steps.before.outputs.total }} -> "Total Jobs": ${{ steps.set-output.outputs.after_total }}
          delete-branch: true
          reviewers: yury-dubinin

      - name: Add full jobs data as PR comment
        if: steps.create-pr.outputs.pull-request-operation != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '### Full Jobs Data'
            echo '```json'
            jq . crypto_current_gh.json
            echo '```'
          } > /tmp/comment_body.md
          gh pr comment "${{ steps.create-pr.outputs.pull-request-number }}" --body-file /tmp/comment_body.md
