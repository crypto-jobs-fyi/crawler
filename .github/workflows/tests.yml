name: CI Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.json'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.json'

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            runner: ubuntu-latest
            tests: >-
              test/test_ashbyhq_scraper.py
              test/test_avara_scraper.py
              test/test_base_scraper.py
              test/test_btcsuisse.py
              test/test_c3_scraper.py
          - shard: 2
            runner: ubuntu-latest
            tests: >-
              test/test_cleo_scraper.py
              test/test_coinbase_scraper.py
              test/test_company_list.py
              test/test_consensys_scraper.py
              test/test_gem.py
              test/test_gemini_scraper.py
              test/test_greenhouse_scraper.py
          - shard: 3
            runner: ubuntu-latest
            tests: >-
              test/test_kula.py
              test/test_lever_scraper.py
              test/test_lmax_scraper.py
              test/test_nebius_scraper.py
              test/test_paxos_scraper.py
              test/test_recruitee_scraper.py
          - shard: 4
            runner: ubuntu-latest
            tests: >-
              test/test_robinhood_scraper.py
              test/test_smartrecruiters_scraper.py
              test/test_workable_scraper.py
              test/test_world.py
          - shard: 5
            runner: macos-latest
            tests: >-
              test/test_helsing_scraper.py
              test/test_circle_scraper.py
              test/test_ripple_scraper.py
              test/test_sygnum_scraper.py
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests (shard ${{ matrix.shard }}, Linux)
        if: runner.os == 'Linux'
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          xvfb-run pytest ${{ matrix.tests }}

      - name: Run tests (shard ${{ matrix.shard }}, macOS)
        if: runner.os == 'macOS'
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest ${{ matrix.tests }}
