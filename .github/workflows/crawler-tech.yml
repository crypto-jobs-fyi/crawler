name: Run Crawler Tech

on:
  schedule:
    - cron: '0 8 * * 0,2,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Get before total_jobs
        id: before
        run: |
          if [ -f tech_current_jobs.json ]; then
            echo "total=$(jq -r '(.total_jobs // .["Total Jobs"] // 0)' tech_current_jobs.json)" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Run crawler_tech.py
        run: python crawler_tech.py

      - name: Run write_tech_jobs_age.py
        run: python write_tech_jobs_age.py

      - name: Run get_new_tech_jobs.py
        run: python get_new_tech_jobs.py
      
      - name: set-output
        if: failure() || success()
        id: set-output
        run: |
          ls -l
          echo "current=$(jq -c . tech_current_jobs.json)" >> $GITHUB_OUTPUT
          echo "after_total=$(jq -r '(.total_jobs // .["Total Jobs"] // 0)' tech_current_jobs.json)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update data via crawler_tech.py [automated]'
          base: main
          branch: 'auto/crawler-tech-update'
          title: 'Automated update from crawler_tech.py'
          body: |
            This PR contains changes made by running crawler_tech.py via GitHub Actions.

            "total_jobs": ${{ steps.before.outputs.total }} -> "total_jobs": ${{ steps.set-output.outputs.after_total }}
          delete-branch: true
          reviewers: yury-dubinin

      - name: Add full jobs data as PR comment
        if: steps.create-pr.outputs.pull-request-operation != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo '### Full Jobs Data'
            echo '```json'
            echo '${{ steps.set-output.outputs.current }}' | jq .
            echo '```'
          } > /tmp/comment_body.md
          gh pr comment "${{ steps.create-pr.outputs.pull-request-number }}" --body-file /tmp/comment_body.md
